<div class="container">
  <h2>Learn</h2>

  <p>Select a language:</p>
  <app-button [options]="languageOptions()" (selectedButton)="onSelectLanguage($event)" />

  <!-- @if (selectedLanguage()) {
    <p>Select a framework:</p>
    <app-button [options]="frameworkOptions()" (selectedButton)="onSelectFramework($event)" />
  } -->

  @if (selectedLanguage()) {
    <app-dropdown [options]="topicOptions" (selectedOption)="onSelectTopic($event)" />
  }

  @if (selectedTopic()) {
    <app-dropdown [options]="subtopicOptions()" (selectedOption)="onSelectSubtopic($event)" />
  }

  @if (selectedSubtopic()) {
    <app-dropdown [options]="itemOptions()" (selectedOption)="onSelectItem($event)" />
  }

  @if (selectedItem()) {
    <app-card [cardData]="cardData()" />
  }
</div>
